<div class="wrap">
<div class="product-toggle">
  <div class="pt-btn ps5 on" onclick="selProduct('ps5',this)">
    <div class="pt-title">🎮 PS5 Stock Finder</div>
    <div class="pt-sub">Web app — 1 week build</div>
  </div>
  <div class="pt-btn" onclick="selProduct('fit',this)">
    <div class="pt-title">💪 Diet + Gym App</div>
    <div class="pt-sub">Flutter app — 4 weeks build</div>
  </div>
</div>

<div id="content"></div>
</div>

<script>
const PS5_COLOR = '#003087';
const FIT_COLOR = '#1D9E75';
let currentProduct = 'ps5';
let currentTab = 0;

const PS5_TABS = ['overview','architecture','retailers','code','sprints','revenue'];
const PS5_LABELS = ['Overview','Architecture','Retailers','Key code','Sprints','Revenue'];

const FIT_TABS = ['overview','features','screens','stack','code','sprints','revenue'];
const FIT_LABELS = ['Overview','Features','Screens','Tech stack','Key code','Sprints','Revenue'];

function selProduct(p, el){
  currentProduct=p; currentTab=0;
  document.querySelectorAll('.pt-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render();
}

function selTab(i){ currentTab=i; render(); }

function render(){
  const color = currentProduct==='ps5' ? PS5_COLOR : FIT_COLOR;
  const tabs = currentProduct==='ps5' ? PS5_TABS : FIT_TABS;
  const labels = currentProduct==='ps5' ? PS5_LABELS : FIT_LABELS;
  
  let tabsHtml = tabs.map((t,i)=>`
    <div class="tab ${i===currentTab?'on':''}" onclick="selTab(${i})"
      style="${i===currentTab?'color:'+color+';border-bottom-color:'+color+';':''}">${labels[i]}</div>
  `).join('');

  let bodyHtml = currentProduct==='ps5' ? renderPS5(currentTab) : renderFit(currentTab);

  document.getElementById('content').innerHTML = `
    <div class="tabs">${tabsHtml}</div>
    ${bodyHtml}
    <button class="askbtn" style="border-color:${color};color:${color};" 
      onclick="sendPrompt('Write me the complete ${currentProduct==='ps5'?'scraper.py with Playwright for all 5 Indian retailers and the Telegram notification bot':'Claude prompt for gym routine generation and the Flutter workout_screen.dart with exercise cards and timer'} for the ${currentProduct==='ps5'?'PS5 Stock Finder':'Diet and Gym app'}')">
      ${currentProduct==='ps5'?'Write the scraper + notification code ↗':'Write the Claude prompt + Flutter workout screen ↗'}
    </button>`;
}

function renderPS5(tab){
  const c = PS5_COLOR;
  if(tab===0) return `
    <div class="callout" style="background:#E6F1FB;">
      <p style="color:#042C53;">PS5 has been out of stock repeatedly in India since launch. A dedicated Indian stock tracker — monitoring Amazon.in, Flipkart, Croma, Reliance Digital, Sony Centre, and Games The Shop — with instant WhatsApp/Telegram/email alerts when stock appears is genuinely useful and monetisable. Build time: 5–7 days. Stack: Next.js + FastAPI + Playwright + Celery + Redis.</p>
    </div>
    <div class="lbl">What it does</div>
    <div class="feature-list">
      <div class="feat"><div class="feat-icon">🔍</div><div class="feat-body"><div class="feat-name">Real-time stock monitoring</div><div class="feat-desc">Checks 6 major Indian retailers every 5 minutes. Detects stock changes within minutes of them going live. Shows: In Stock / Out of Stock / Limited Stock.</div></div></div>
      <div class="feat"><div class="feat-icon">🔔</div><div class="feat-body"><div class="feat-name">Instant multi-channel alerts</div><div class="feat-desc">Free: email + browser push notification. Premium: WhatsApp message (Twilio) + Telegram bot — delivered within 1 minute of stock appearing. Speed matters — PS5 sells out in minutes.</div></div></div>
      <div class="feat"><div class="feat-icon">💰</div><div class="feat-body"><div class="feat-name">Price history tracker</div><div class="feat-desc">Track price changes over time. Alert when price drops below your threshold. PS5 Disc vs Digital vs bundles — all tracked separately.</div></div></div>
      <div class="feat"><div class="feat-icon">📊</div><div class="feat-body"><div class="feat-name">Stock history dashboard</div><div class="feat-desc">"Amazon had PS5 in stock 3 times last month — always on Tuesday mornings." Patterns help buyers plan. This data only you have.</div></div></div>
      <div class="feat"><div class="feat-icon">🤖</div><div class="feat-body"><div class="feat-name">Telegram bot command interface</div><div class="feat-desc">/status — current stock across all retailers. /price — current prices. /alert — set your alert preferences. /history — last 10 stock events. Clean, fast, no app needed.</div></div></div>
      <div class="feat"><div class="feat-icon">🌐</div><div class="feat-body"><div class="feat-name">Public live dashboard</div><div class="feat-desc">A public webpage showing live status of all retailers. Green = in stock, Red = out of stock, timestamp of last check. This page is what ranks on Google and drives organic traffic.</div></div></div>
    </div>
    <div class="grid4">
      <div class="met"><div class="ml">Build time</div><div class="mv">5–7 days</div></div>
      <div class="met"><div class="ml">Stack</div><div class="mv">Next.js + FastAPI</div></div>
      <div class="met"><div class="ml">Check frequency</div><div class="mv">Every 5 min</div></div>
      <div class="met"><div class="ml">First revenue</div><div class="mv">Day 1</div></div>
    </div>`;

  if(tab===1) return `
    <div class="lbl">Full architecture</div>
    <div class="code"><span class="cm"># How everything connects:

Celery beat scheduler (every 5 min)
    │
    ▼
scraper.py — Playwright checks each retailer
    │
    ├── Compares with last_known_status in Redis
    │
    ├── If CHANGED (out→in or in→out):
    │     ├── Update Supabase stock_events table
    │     ├── Trigger notification_service.py
    │     │     ├── Email (Resend) → all email subscribers
    │     │     ├── WhatsApp (Twilio) → premium subscribers
    │     │     └── Telegram bot → bot subscribers
    │     └── Update Redis latest_status
    │
    └── Always: update last_checked timestamp

Next.js frontend:
    ├── /page.tsx — live dashboard (Supabase realtime)
    ├── /api/subscribe — POST to create alert subscription
    └── /api/status — GET current status (cached Redis)</span></div>

    <div class="lbl">Tech stack</div>
    <div class="grid2">
      <div class="card"><div class="ct">Playwright (Python)</div><div class="cb">Scrapes JavaScript-heavy sites like Amazon and Flipkart. Headless Chrome. Stealth mode to avoid bot detection. Runs in Docker on Railway.</div></div>
      <div class="card"><div class="ct">Celery + Redis</div><div class="cb">Celery beat triggers scraper task every 5 minutes. Redis stores last known stock status per retailer. Redis also caches the dashboard data to reduce DB load.</div></div>
      <div class="card"><div class="ct">Supabase</div><div class="cb">stock_events table (all stock in/out events with timestamp). subscribers table (email, phone, preferences). price_history table. You already know this.</div></div>
      <div class="card"><div class="ct">Next.js + Supabase Realtime</div><div class="cb">Dashboard updates live when new stock event is inserted. No polling needed — Supabase Realtime pushes updates to the browser instantly.</div></div>
    </div>`;

  if(tab===2) return `
    <div class="lbl">All 6 Indian retailers — how to scrape each</div>
    <div class="retailer-card">
      <div class="rc-head"><div class="rc-name">Amazon India (amazon.in)</div><span class="rc-badge" style="background:#FF980020;color:#FF6600;">Hardest — anti-bot</span></div>
      <div class="rc-body">URL: amazon.in/dp/B09FH23FQ3 (PS5 ASIN). Check: "Add to Cart" button presence vs "Currently Unavailable" text. Amazon aggressively blocks scrapers — use Playwright with stealth plugin (playwright-stealth), random delays (3–8 sec), rotate user agents. Check every 10 min max (not 5) to avoid IP ban. Consider ScraperAPI as fallback (₹1,500/mo for 100K requests).</div>
    </div>
    <div class="retailer-card">
      <div class="rc-head"><div class="rc-name">Flipkart (flipkart.com)</div><span class="rc-badge" style="background:#FF880020;color:#FF8800;">Medium — needs JS</span></div>
      <div class="rc-body">URL: flipkart.com/sony-playstation-5-digital-edition/p/itm... Check: "ADD TO CART" button vs "NOTIFY ME" button. Flipkart uses React — content loads after JS execution, so Playwright is required (not requests+BS4). Less aggressive anti-bot than Amazon. 5-min intervals work.</div>
    </div>
    <div class="retailer-card">
      <div class="rc-head"><div class="rc-name">Croma (croma.com)</div><span class="rc-badge" style="background:#00880020;color:#008800;">Easy — API available</span></div>
      <div class="rc-body">Croma has a product availability API: croma.com/api/v2/products/{sku}/stock-availability. Returns JSON directly. No scraping needed. Product SKU for PS5 is documented. Just call the API every 5 min. Clean, reliable, respectful.</div>
    </div>
    <div class="retailer-card">
      <div class="rc-head"><div class="rc-name">Reliance Digital (reliancedigital.in)</div><span class="rc-badge" style="background:#00440020;color:#004488;">Easy — simple page</span></div>
      <div class="rc-body">Static-ish product page. Check for "Add to Cart" vs "Notify Me When Available" button. requests + BeautifulSoup works (no JS needed). Very low anti-bot measures. Simple CSS selector on button text.</div>
    </div>
    <div class="retailer-card">
      <div class="rc-head"><div class="rc-name">Sony India Direct (direct.playstation.com)</div><span class="rc-badge" style="background:#00338820;color:#0033AA;">Medium — JSON API</span></div>
      <div class="rc-body">PlayStation Direct has a product status API endpoint. Check network tab on the product page — you'll find an API call like direct.playstation.com/api/products/availability. Returns JSON with in_stock boolean. Most reliable source since it's Sony's own store.</div>
    </div>
    <div class="retailer-card">
      <div class="rc-head"><div class="rc-name">Games The Shop (gamesthe.shop)</div><span class="rc-badge" style="background:#88008820;color:#880088;">Easy — small site</span></div>
      <div class="rc-body">Smaller retailer, easier to scrape. Simple HTML page. requests + BS4 sufficient. Often gets PS5 stock before the big retailers. Worth monitoring despite smaller volume — users who know about it are serious buyers.</div>
    </div>
    <div class="lbl">Anti-bot strategy</div>
    <div class="code"><span class="cm"># scraper.py — stealth configuration</span>
<span class="kw">from</span> playwright.async_api <span class="kw">import</span> async_playwright
<span class="kw">import</span> random, asyncio

USER_AGENTS = [
    <span class="st">"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36..."</span>,
    <span class="st">"Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7) AppleWebKit..."</span>,
    <span class="st">"Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X)..."</span>,
]

<span class="kw">async def</span> <span class="kw">scrape_amazon</span>():
    <span class="kw">async with</span> async_playwright() <span class="kw">as</span> p:
        browser = <span class="kw">await</span> p.chromium.launch(headless=<span class="kw">True</span>)
        ctx = <span class="kw">await</span> browser.new_context(
            user_agent=random.choice(USER_AGENTS),
            viewport={<span class="st">"width"</span>: <span class="kw">1920</span>, <span class="st">"height"</span>: <span class="kw">1080</span>},
            locale=<span class="st">"en-IN"</span>
        )
        page = <span class="kw">await</span> ctx.new_page()
        <span class="cm"># Random delay before request</span>
        <span class="kw">await</span> asyncio.sleep(random.uniform(<span class="kw">2</span>, <span class="kw">6</span>))
        <span class="kw">await</span> page.goto(<span class="st">"https://www.amazon.in/dp/B09FH23FQ3"</span>)
        <span class="kw">await</span> page.wait_for_load_state(<span class="st">"networkidle"</span>)
        
        <span class="cm"># Check availability</span>
        add_to_cart = <span class="kw">await</span> page.query_selector(<span class="st">"#add-to-cart-button"</span>)
        unavailable = <span class="kw">await</span> page.query_selector(<span class="st">"#outOfStock"</span>)
        
        in_stock = add_to_cart <span class="kw">is not None and</span> unavailable <span class="kw">is None</span>
        price = <span class="kw">await</span> get_price(page)  <span class="cm"># extract from .a-price-whole</span>
        
        <span class="kw">await</span> browser.close()
        <span class="kw">return</span> {<span class="st">"in_stock"</span>: in_stock, <span class="st">"price"</span>: price, <span class="st">"retailer"</span>: <span class="st">"amazon"</span>}</div>`;

  if(tab===3) return `
    <div class="lbl">Notification system — the most important code</div>
    <div class="code"><span class="cm"># notification_service.py</span>
<span class="kw">async def</span> <span class="kw">handle_stock_change</span>(retailer: str, new_status: dict, old_status: dict):
    <span class="kw">if not</span> new_status[<span class="st">"in_stock"</span>] <span class="kw">and not</span> old_status[<span class="st">"in_stock"</span>]:
        <span class="kw">return</span>  <span class="cm"># Still out of stock — no notification</span>
    
    <span class="kw">if</span> new_status[<span class="st">"in_stock"</span>] <span class="kw">and not</span> old_status[<span class="st">"in_stock"</span>]:
        <span class="cm"># 🚨 WENT IN STOCK — notify immediately</span>
        msg = (
            <span class="st">f"🎮 PS5 IN STOCK at {retailer.upper()}!\\n"</span>
            <span class="st">f"💰 Price: ₹{new_status['price']:,}\\n"</span>
            <span class="st">f"🔗 {new_status['url']}\\n"</span>
            <span class="st">f"⚡ Act fast — sells out in minutes!"</span>
        )
        subscribers = get_subscribers_for_retailer(retailer)
        
        <span class="kw">await</span> asyncio.gather(
            send_emails(subscribers.email_list, msg),
            send_whatsapp(subscribers.whatsapp_list, msg),  <span class="cm"># premium only</span>
            send_telegram(msg),   <span class="cm"># all telegram subscribers</span>
            send_push(msg)        <span class="cm"># browser push subscribers</span>
        )
        
        <span class="cm"># Log to stock_events table</span>
        supabase.table(<span class="st">"stock_events"</span>).insert({
            <span class="st">"retailer"</span>: retailer, <span class="st">"event"</span>: <span class="st">"in_stock"</span>,
            <span class="st">"price"</span>: new_status[<span class="st">"price"</span>], <span class="st">"timestamp"</span>: <span class="st">"now()"</span>
        }).execute()

<span class="cm"># Telegram bot commands</span>
<span class="kw">from</span> telegram <span class="kw">import</span> Update
<span class="kw">from</span> telegram.ext <span class="kw">import</span> Application, CommandHandler

<span class="kw">async def</span> <span class="kw">status_command</span>(update: Update, ctx):
    statuses = get_all_current_statuses()  <span class="cm"># from Redis</span>
    msg = <span class="st">"🎮 PS5 Stock Status (Updated 5 min ago)\\n\\n"</span>
    <span class="kw">for</span> retailer, data <span class="kw">in</span> statuses.items():
        emoji = <span class="st">"✅"</span> <span class="kw">if</span> data[<span class="st">"in_stock"</span>] <span class="kw">else</span> <span class="st">"❌"</span>
        msg += <span class="st">f"{emoji} {retailer}: {data['status']} — ₹{data['price']:,}\\n"</span>
    <span class="kw">await</span> update.message.reply_text(msg)

app = Application.builder().token(TELEGRAM_TOKEN).build()
app.add_handler(CommandHandler(<span class="st">"status"</span>, status_command))
app.add_handler(CommandHandler(<span class="st">"alert"</span>, alert_command))
app.add_handler(CommandHandler(<span class="st">"price"</span>, price_command))</div>

    <div class="lbl">Supabase schema</div>
    <div class="code"><span class="kw">CREATE TABLE</span> stock_events (
  id          UUID <span class="kw">PRIMARY KEY DEFAULT</span> gen_random_uuid(),
  retailer    TEXT,       <span class="cm">-- "amazon", "flipkart", "croma", etc.</span>
  event       TEXT,       <span class="cm">-- "in_stock", "out_of_stock", "price_change"</span>
  price       INTEGER,    <span class="cm">-- in rupees</span>
  url         TEXT,
  created_at  TIMESTAMPTZ <span class="kw">DEFAULT</span> now()
);

<span class="kw">CREATE TABLE</span> subscribers (
  id          UUID <span class="kw">PRIMARY KEY DEFAULT</span> gen_random_uuid(),
  email       TEXT <span class="kw">UNIQUE</span>,
  phone       TEXT,        <span class="cm">-- for WhatsApp</span>
  telegram_id TEXT,
  tier        TEXT <span class="kw">DEFAULT</span> <span class="st">'free'</span>,  <span class="cm">-- free / premium</span>
  retailers   TEXT[],      <span class="cm">-- which retailers to watch</span>
  max_price   INTEGER,     <span class="cm">-- only alert if price below this</span>
  created_at  TIMESTAMPTZ <span class="kw">DEFAULT</span> now()
);</div>`;

  if(tab===4) return `
    <div class="sprint-block" style="background:#003087 15;border:0.5px solid #003087;">
      <span class="sb-label" style="background:#003087;">Day 1–2 — Core scraper + Telegram bot</span>
      <div class="sb-title">Goal: Telegram bot working, showing live stock status</div>
      <div class="sb-task"><div class="sb-dot" style="background:#003087;"></div>pip install playwright celery redis supabase python-telegram-bot requests beautifulsoup4</div>
      <div class="sb-task"><div class="sb-dot" style="background:#003087;"></div>Write scraper for Croma (easiest — JSON API) and Reliance Digital (simple HTML). Test both manually. Verify accuracy against the actual website.</div>
